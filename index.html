<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <canvas class="particles-canvas" id="canvas"></canvas>

  <div class="app">

    <!-- Header -->
    <header class="header">
      
      <h1 class="logo">TIC<span class="x-color">X</span>TAC<span class="o-color">O</span></h1>
      <p class="tagline">Three in a Row Wins</p>
       <div class="developer">Created By : Guruprasath M S</div>
    </header>

    <!-- Mode Selector -->
    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" id="btnPvP" data-mode="pvp">
        <span class="mode-icon">👥</span>
        <span class="mode-text">Player vs Player</span>
      </button>
      <button class="mode-btn" id="btnPvAI" data-mode="ai">
        <span class="mode-icon">🤖</span>
        <span class="mode-text">Player vs AI</span>
      </button>
    </div>

    <!-- Difficulty (AI only) -->
    <div class="difficulty-row" id="diffRow">
      <span class="diff-label">AI Difficulty:</span>
      <div class="diff-btns">
        <button class="diff-btn" data-diff="easy">Easy</button>
        <button class="diff-btn active" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-card x-card" id="scoreX">
        <div class="score-symbol x-color">✕</div>
        <div class="score-name" id="nameX">Player X</div>
        <div class="score-val" id="valX">0</div>
      </div>
      <div class="score-divider">
        <div class="draw-count" id="drawCount">0</div>
        <div class="draw-label">DRAWS</div>
      </div>
      <div class="score-card o-card" id="scoreO">
        <div class="score-symbol o-color">○</div>
        <div class="score-name" id="nameO">Player O</div>
        <div class="score-val" id="valO">0</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text" id="statusText">Player X's Turn</div>
    </div>

    <!-- Board -->
    <div class="board-wrapper">
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
        <!-- Win line overlay -->
        <svg class="win-line-svg" id="winLineSvg" viewBox="0 0 3 3" xmlns="http://www.w3.org/2000/svg">
          <line id="winLine" x1="0" y1="0" x2="0" y2="0" stroke-width="0.08" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="action-btn new-game-btn" id="btnNewGame">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.49"/></svg>
        New Game
      </button>
      <button class="action-btn reset-score-btn" id="btnResetScore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Reset Score
      </button>
    </div>

  </div>

  <!-- Win Overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlayEmoji">🎉</div>
      <div class="overlay-title" id="overlayTitle">Player X Wins!</div>
      <div class="overlay-sub" id="overlaySub">Brilliant move!</div>
      <button class="overlay-btn" id="overlayBtn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
